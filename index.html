<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zishan Khan</title>

  <!-- Icons + Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@hackernoon/pixel-icon-library/fonts/iconfont.css">
  <link href="https://cdn.jsdelivr.net/npm/pixelarticons@1.8.1/fonts/pixelart-icons-font.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #000;
      --accent: #1DA1F2;
      --muted: #ccc;
      --h1-min: 2.4rem;
      --h1-preferred: 7.5vw;
      --h1-max: 5rem;
      --icon-min: 22px;
      --icon-preferred: 6.5vw;
      --icon-max: 44px;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(ellipse at bottom, #020111 0%, #000 100%);
  overflow: hidden;
      color: #fff;
      font-family: 'VT323', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    body::before {
      content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
      z-index: 998;
  animation: moveStars 100s linear infinite;
    }

    @keyframes moveStars {
      from { transform: translate(0, 0); }
      to { transform: translate(-50%, -50%); }
    }

    /* Centered content */
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1rem;
      
    }

    h1 {
      margin: 0;
      font-size: clamp(var(--h1-min), var(--h1-preferred), var(--h1-max));
      font-weight: bold;
    }

    .name {
      color: var(--accent);
    }

    .icons {
      margin-top: 1.2rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .icons .hn {
      font-size: clamp(var(--icon-min), var(--icon-preferred), var(--icon-max));
      transition: transform 0.2s ease;
      display: inline-block;
    }

    .icons .hn:hover {
      transform: translateY(-3px) scale(1.1);
    }

    /* ---------------- ICON COLORS + GRADIENTS ---------------- */

    /* Fable icon (brand orange) */
    .hn-themes-solid {
      background: linear-gradient(45deg, #FAAF4B, #FFCA6B, #E6942E);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hn-github { color: #E6E6E6; }

    .hn-instagram {
      background: radial-gradient(circle at 30% 110%,
        #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hn-discord { color: #5865F2; }

    .hn-filter-alt-circle-solid {
      background: linear-gradient(45deg, #0f0, #00ffcc, #39ff14);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 4s linear infinite;
      background-size: 200% 200%;
    }

    @keyframes shine {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @media (max-width: 640px) {
      h1 { font-size: clamp(3rem, 10vw, 4.2rem); }
      .icons .hn { font-size: clamp(36px, 10vw, 48px); }
    }
    /* ---------------- PRELOADER STYLES ---------------- */
    #preloader {
      position: fixed;
      inset: 0;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #preloader i {
      font-size: 3rem;
      color: #1DA1F2;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #preloader.hide {
      opacity: 0;
      visibility: hidden;
    }
  </style>
</head>
<body>
  <!-- 🌀 Preloader -->
  <div id="preloader">
    <i class="hn hn-globe-solid"></i>
  </div>

  <!-- 🌌 Main content -->
  <div class="content" id="main-content">
    <h1>Hey, I'm <span class="name">Zishan</span>!</h1>
    <div class="icons">
      <i class="hn hn-themes-solid"></i>
      <i class="hn hn-github"></i>
      <i class="hn hn-instagram"></i>
      <i class="hn hn-discord"></i>
      <i class="hn hn-filter-alt-circle-solid"></i>
    </div>
  </div>

  <!-- 🐾 Oneko script -->
  <script src="/js/oneko.js" defer></script>

  <!-- Preloader Logic -->
  <script>
    window.addEventListener("load", () => {
      const preloader = document.getElementById("preloader");
      const content = document.getElementById("main-content");
      preloader.classList.add("hide");
      setTimeout(() => {
        preloader.style.display = "none";
        content.classList.add("show");
      }, 600);
    });
  </script>
</body>
</html>
