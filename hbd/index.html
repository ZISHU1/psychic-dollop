<!DOCTYPE html>
<html>
<head>
    <title>Image Page</title>
</head><style>
        /* Remove default spacing and ensure full height */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents scrollbars */
        }

        /* Make the image cover the entire viewport */
        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Fills the screen while maintaining aspect ratio */
            display: block; /* Removes unwanted whitespace at the bottom */
        }
    </style>
<body>
    <img src="https://media.tenor.com/lyl4Zk4JkEMAAAAM/halo.gif" alt="happy birthday ">
</body>
</html>
